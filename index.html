<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="livro"> <!-- Livro -->

            <h1 class="titulo">
                <span>Nome: Jhas'kier D'Vincy Plumadouro</span>
                <span class="nivel">Nível: 01</span>
            </h1>
            <img class="icon" src="images/iconeEdit.png" alt="icon">

                    <img class="personagem" src="images/Jhas'kier.png">

                    <ul >

                        <li>Teste</li>
                        <li>Teste</li>
                    </ul>
                </div>

            </div>

            <div id="Barras">
                <div>
                    <img class="icon1" src="images/iconeEdit.png" alt="icon">

                        <span class="label"><span style="color: #8b0000;">V</span>ida</span>

                    </div>
                    
                    <img class="icon1" src="images/iconeEdit.png" alt="icon">

                        <div class="barra-container">
                            <div class="preenchimento"></div>
                        </div>
                    </div>

                    <img class="icon1" src="images/iconeEdit.png" alt="icon">
                    <div class="barra mana">
                        <span class="label"><span style="color: purple;">M</span>ana</span>
                        <div class="barra-container">
                            <div class="preenchimento"></div>
                        </div>
                    </div>

                    <img class="icon1" src="images/iconeEdit.png" alt="icon">
                    <div class="barra frio">
                        <span class="label"><span style="color: blue;">F</span>rio</span>
                        <div class="barra-container">
                            <div class="preenchimento"></div>
                        </div>
                    </div>

                </div>
            </div>
            <img class="icon2" src="images/iconeEdit.png" alt="icon">

            <h1>Condições</h1>

            <div class="condiçoes">
            <img class="iconeCondiçoes" src="images/scar-wound.png" alt="icone">
            <img class="iconeCondiçoes" src="images/scar-wound.png" alt="icone">
            <img class="iconeCondiçoes" src="images/scar-wound.png" alt="icone">
            <img class="iconeCondiçoes" src="images/scar-wound.png" alt="icone">
            <img class="iconeCondiçoes" src="images/scar-wound.png" alt="icone">
            </div>
         
        </div> <!-- Fim Página Esquerda -->


        <div class="pagFundoDir">
            <h1 class="titulo">Atributos</h1>
            <img class="icon" src="images/iconeEdit.png" alt="icon">
            
            <div class="divPagDir">
                <div>
                    <H2 class="destaque">Núcleo</H2>
                    <p class="pNucleo">Artifíce</p>
                </div>
                <div>
                    <h2 class="destaque">Genéticas</h2>
                   <ul class="ulN">
                    <li>Raquitico</li>
                    <li>Inteligente</li>

            </div>

            <p class="atributos">25</p>
            <button class="btn-custom">Passar Turno</button>
